Adds a new Story to the collection from Learn Sanskrit.cc
---
tags:
  - Tokenized Data Routes

summary: Add a new story to the tokenized collection

description: >
  ⚠️ This endpoint triggers the Sanskrit tokenization pipeline and writes
  data to the tokenized story collection.

security:
  - Bearer: []

parameters:
  - name: story_id
    in: query
    type: string
    required: true
    description: >
      Unique identifier of the story to retrieve and tokenize.

      Example:
      929e7fb1-ba2c-40a9-9e8b-9bf0bbc8c06e
    example: 929e7fb1-ba2c-40a9-9e8b-9bf0bbc8c06e

responses:
  200:
    description: Story successfully retrieved, tokenized, and stored.
